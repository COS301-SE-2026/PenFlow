services:
  # Backend 
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: penflow-backend
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Supabase 
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      # Auth0
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_ISSUER: ${AUTH0_ISSUER}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      # Phase 1 API Keys needed
      SHODAN_API_KEY: ${SHODAN_API_KEY}
      HIBP_API_KEY: ${HIBP_API_KEY}
    ports:
      - "3001:3001"
    networks:
      - penflow-network
    restart: unless-stopped

  # Frontend 
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: penflow-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Auth0 
      NEXT_PUBLIC_AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      NEXT_PUBLIC_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      NEXT_PUBLIC_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - penflow-network
    restart: unless-stopped

networks:
  penflow-network:
    driver: bridge
