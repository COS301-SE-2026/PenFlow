      #       FAILED=$(node -e "const r=require('./test-results.json');console.log(r.numFailedTests)")
      #       COLOR=$([ "$FAILED" -eq 0 ] && echo "brightgreen" || echo "red")
      #       echo "passed=$PASSED" >> $GITHUB_OUTPUT
      #       echo "total=$TOTAL" >> $GITHUB_OUTPUT
      #       echo "color=$COLOR" >> $GITHUB_OUTPUT
      #     else
      #       echo "passed=0" >> $GITHUB_OUTPUT
      #       echo "total=0" >> $GITHUB_OUTPUT
      #      echo "color=lightgrey" >> $GITHUB_OUTPUT
      #     fi

      # Badge
      # - name: Update all-tests badge
      #   if: github.event_name == 'push' && steps.parse-results.outputs.total != '0'
      #   uses: schneegans/dynamic-badges-action@v1.7.0
      #   with:
      #     auth: ${{ secrets.GIST_TOKEN }}
      #     gistID: ${{ env.GIST_ID }}
      #     filename: penflow-tests.json
      #     label: tests
      #     message: "${{ steps.parse-results.outputs.passed }}/${{ steps.parse-results.outputs.total }} passed"
      #     color: ${{ steps.parse-results.outputs.color }}

      # Code Coverage
      # - name: Upload project coverage
      #   if: always()
      #   uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     directory: coverage
      #     fail_ci_if_error: false

      # Build 
      - name: Build Backend
        run: pnpm --filter backend run build

      - name: Build Frontend
        run: pnpm --filter frontend run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
