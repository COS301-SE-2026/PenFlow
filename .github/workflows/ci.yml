name: PenFlow CI
# Decide on what runs the workflow
on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

# Remember to configure the codecov and gist badge tokens

env:
  GIST_ID: af8001a22548859ade98fec8bd7e9712

jobs:
  ci-pipeline:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Setup 
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Linting
      - name: Lint Codebase
        run: pnpm run lint

      # Testing (Coverage included)
      - name: Run all tests with coverage
        run: pnpm test --json --outputFile=test-results.json --coverage --coverageReporters=lcov --coverageDirectory=coverage --forceExit --maxWorkers=50%

      # - name: Test Results Output
